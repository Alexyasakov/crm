<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Контакт-центр</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f0f2f5;
  --text:#111;--text2:#555;--text3:#999;
  --border:#e5e7eb;--border2:#d1d5db;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5}
input,select{font-family:inherit;font-size:14px;width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
button{font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);padding:8px 14px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
button:hover{background:var(--bg3)}
button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
button.primary:hover{background:#1d4ed8;border-color:#1d4ed8}
button:active{transform:scale(.97)}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:10}
.topbar-logo{font-size:15px;font-weight:600}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;font-size:13px;margin-left:auto}
.user-chip:hover{background:var(--bg2)}
.layout{display:flex;flex:1}
.sidebar{width:200px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue-text);font-weight:500}
.nav-item i{font-size:17px;flex-shrink:0}
.main{flex:1;padding:24px;max-width:920px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1rem}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.metric .ml{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric .mv{font-size:24px;font-weight:700}
.metric .ms{font-size:11px;color:var(--text3);margin-top:2px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:.75rem}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:600;font-size:12px;color:var(--text2);border-bottom:2px solid var(--border);background:var(--bg2);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-none{background:var(--red-bg);color:var(--red-text)}
.b-100{background:var(--blue-bg);color:var(--blue-text)}
.b-150{background:var(--amber-bg);color:var(--amber-text)}
.b-200{background:var(--green-bg);color:var(--green-text)}
.b-m{background:var(--blue-bg);color:var(--blue-text)}
.b-q{background:var(--amber-bg);color:var(--amber-text)}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.bar-bg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin:6px 0 4px}
.bar-fill{height:100%;border-radius:4px;background:var(--blue);transition:width .4s}
.action-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:3px 5px;border-radius:4px;line-height:1}
.action-btn:hover{color:var(--text);background:var(--bg3)}
.action-btn.danger:hover{color:var(--red);background:var(--red-bg)}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg2);padding:2rem}
.login-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.user-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 8px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-family:inherit;transition:all .15s}
.user-btn:hover,.user-btn.sel{border-color:var(--blue);background:var(--blue-bg)}
.user-btn span{font-size:12px;font-weight:500}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:1rem 0}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.nkey{padding:11px;font-size:16px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;color:var(--text);font-family:inherit}
.nkey:hover{background:var(--bg3)}
.nkey:active{transform:scale(.93)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px}
.err{color:var(--red-text);font-size:12px;text-align:center;min-height:18px;margin-top:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.16);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-head h3{font-size:15px;font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;color:var(--text2);font-size:13px}
.op-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.op-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem;box-shadow:var(--shadow)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.4}
.nav-sep{height:1px;background:var(--border);margin:6px 0}
@media(max-width:640px){.sidebar{display:none}.frow{grid-template-columns:1fr}.main{padding:12px}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<div id="root"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// =====================================================
// FIREBASE НАЛАШТУВАННЯ
// Отримати на: console.firebase.google.com
// Новий проєкт → Realtime Database → Правила → змінити на:
// { "rules": { ".read": true, ".write": true } }
// =====================================================
const firebaseConfig = {
  apiKey: "AIzaSyA_NOgkOzg3fy9izZYa6a6MHHwPNgeYOZo",
  authDomain: "crm-contact-center-kpi.firebaseapp.com",
  databaseURL: "https://crm-contact-center-kpi-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crm-contact-center-kpi",
  storageBucket: "crm-contact-center-kpi.firebasestorage.app",
  messagingSenderId: "1090814818298",
  appId: "1:1090814818298:web:0dba1e084a875ab5805643"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const salesRef = db.ref('sales');

// =====================================================
const OPS = [
  {key:'turnayeva', name:'Турнаєва',  init:'ТУ', bg:'#DBEAFE',tc:'#1e40af',pin:'1111',numpad:true},
  {key:'semenihina',name:'Семенихіна',init:'СЕ', bg:'#D1FAE5',tc:'#065f46',pin:'2222',numpad:true},
  {key:'troshaeva', name:'Трошаєва',  init:'ТР', bg:'#FEE2E2',tc:'#991b1b',pin:'3333',numpad:true},
  {key:'dominike',  name:'Думініке',  init:'ДУ', bg:'#EDE9FE',tc:'#5b21b6',pin:'4444',numpad:true},
  {key:'boss',      name:'Керівник',  init:'КР', bg:'#F3F4F6',tc:'#374151',pin:'10102020Alisa*',numpad:false,boss:true},
];

const fmt=n=>Math.round(n).toLocaleString('uk-UA')+' грн';
const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>{const[y,m,d]=iso.split('-');return`${d}.${m}.${y}`};
const thisMonth=arr=>{const now=new Date();const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;return arr.filter(s=>s.date&&s.date.startsWith(ym))};
const kpiLvl=(m,q)=>{
  if(m>=12&&q>=6)return{label:'200%',bonus:6000,pct:200};
  if(m>=8&&q>=3)return{label:'150%',bonus:4000,pct:150};
  if(m>=5&&q>=2)return{label:'100%',bonus:2500,pct:100};
  return{label:null,bonus:0,pct:Math.min(99,Math.round(Math.min(m/5,q/2)*100))};
};
const kpiClass=l=>!l?'b-none':l==='100%'?'b-100':l==='150%'?'b-150':'b-200';

let cur=null,pinBuf='',pending=null,pwShow=false;
let allSales=[];
let realtimeUnsub=null;

function toast(msg,dur=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
function modal(html){document.getElementById('modal-root').innerHTML=html}
function closeModal(){document.getElementById('modal-root').innerHTML=''}
function render(){document.getElementById('root').innerHTML='';!cur?renderLogin():renderApp()}

// ---- REALTIME LISTENER ----
function startRealtime(){
  if(realtimeUnsub) realtimeUnsub();
  realtimeUnsub = salesRef.on('value', snap=>{
    const data = snap.val()||{};
    allSales = Object.entries(data).map(([fbKey,v])=>({...v,fbKey}));
    if(cur){
      if(cur.boss){renderOverview();renderRecords();}
      else renderSales();
    }
  });
}
function stopRealtime(){if(realtimeUnsub){salesRef.off('value',realtimeUnsub);realtimeUnsub=null;}}

// ---- LOGIN ----
function renderLogin(){
  document.getElementById('root').innerHTML=`
  <div class="login-screen">
    <div class="login-card">
      <div style="width:48px;height:48px;background:var(--blue-bg);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:22px;color:var(--blue-text)">
        <i class="ti ti-building-store" aria-hidden="true"></i></div>
      <h2 style="text-align:center;font-size:16px;margin-bottom:4px">Контакт-центр CRM</h2>
      <p style="text-align:center;color:var(--text2);font-size:13px;margin-bottom:1.25rem">Оберіть профіль для входу</p>
      <div class="user-grid">
        ${OPS.map(op=>`<button class="user-btn" id="ubtn-${op.key}" onclick="selUser('${op.key}')">
          <div class="av" style="width:38px;height:38px;background:${op.bg};color:${op.tc};font-size:12px">${op.init}</div>
          <span>${op.name}</span>
        </button>`).join('')}
      </div>
      <div id="pin-area" style="display:none">
        <hr style="border:none;border-top:1px solid var(--border);margin-bottom:1rem">
        <p id="pin-who" style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:.5rem"></p>
        <div id="pin-input"></div>
        <div class="err" id="pin-err"></div>
      </div>
    </div>
  </div>`;
}
function selUser(key){
  pending=OPS.find(o=>o.key===key);pinBuf='';pwShow=false;
  document.querySelectorAll('.user-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ubtn-'+key).classList.add('sel');
  document.getElementById('pin-area').style.display='block';
  document.getElementById('pin-who').textContent=`Вхід: ${pending.name}`;
  document.getElementById('pin-err').textContent='';
  renderPinInput();
}
function renderPinInput(){
  const el=document.getElementById('pin-input');
  if(pending.numpad){
    el.innerHTML=`<div class="pin-dots">${Array(4).fill(0).map((_,i)=>`<div class="pin-dot" id="pd${i}"></div>`).join('')}</div>
    <div class="numpad">${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`<button class="nkey" onclick="pinKey('${k}')">${k}</button>`).join('')}</div>`;
  } else {
    el.innerHTML=`<div class="pw-wrap" style="margin-bottom:8px">
      <input type="password" id="pw-inp" placeholder="Введіть пароль" oninput="pinBuf=this.value" onkeydown="if(event.key==='Enter')checkPin()">
      <button class="eye" onclick="togglePw()" aria-label="Показати"><i id="eye-i" class="ti ti-eye" aria-hidden="true"></i></button>
    </div>
    <button class="primary" onclick="checkPin()" style="width:100%"><i class="ti ti-login" aria-hidden="true"></i> Увійти</button>`;
    setTimeout(()=>{const f=document.getElementById('pw-inp');if(f)f.focus()},40);
  }
}
function togglePw(){pwShow=!pwShow;const f=document.getElementById('pw-inp');if(f){f.type=pwShow?'text':'password';f.focus()}const i=document.getElementById('eye-i');if(i)i.className=pwShow?'ti ti-eye-off':'ti ti-eye'}
function pinKey(k){
  if(k==='⌫'){pinBuf=pinBuf.slice(0,-1);syncDots();return}
  if(k===''||pinBuf.length>=4)return;
  pinBuf+=String(k);syncDots();
  if(pinBuf.length===4)setTimeout(checkPin,120);
}
function syncDots(){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.toggle('filled',i<pinBuf.length)}}
function checkPin(){
  if(pinBuf===pending.pin){cur=pending;startRealtime();
    document.getElementById('root').innerHTML=`<div class="loading"><div class="spinner"></div> Підключення до бази даних...</div>`;
    setTimeout(render,800);
  } else {
    document.getElementById('pin-err').textContent='Невірний пароль';pinBuf='';
    if(pending.numpad)syncDots();else{const f=document.getElementById('pw-inp');if(f){f.value='';f.focus()}}
  }
}
function logout(){stopRealtime();cur=null;pinBuf='';pending=null;render()}

// ---- APP SHELL ----
function renderApp(){
  const isBoss=!!cur.boss;
  const nav=isBoss
    ?[{k:'overview',i:'ti-layout-dashboard',l:'Огляд'},{k:'records',i:'ti-list',l:'Всі записи'}]
    :[{k:'sales',i:'ti-circle-plus',l:'Продажі'},{k:'my',i:'ti-chart-bar',l:'Місяці'}];

  document.getElementById('root').innerHTML=`
  <div class="app">
    <div class="topbar">
      <i class="ti ti-building-store" style="font-size:18px;color:var(--text2)" aria-hidden="true"></i>
      <span class="topbar-logo">Контакт-центр CRM</span>
      <div style="display:flex;align-items:center;gap:6px;margin-left:auto;margin-right:12px;font-size:12px;color:var(--text2)">
        <div class="live-dot"></div><span>Реальний час</span>
      </div>
      <div class="user-chip" onclick="logout()">
        <div class="av" style="width:24px;height:24px;background:${cur.bg};color:${cur.tc}">${cur.init}</div>
        <span>${cur.name}</span>
        <i class="ti ti-logout" style="font-size:13px;color:var(--text3)" aria-hidden="true"></i>
      </div>
    </div>
    <div class="layout">
      <nav class="sidebar">
        ${nav.map((n,i)=>`<button class="nav-item${i===0?' active':''}" id="nav-${n.k}" onclick="navTo('${n.k}')">
          <i class="ti ${n.i}" aria-hidden="true"></i>${n.l}
        </button>`).join('')}
      </nav>
      <div class="main">
        ${nav.map((n,i)=>`<div id="pg-${n.k}" style="display:${i===0?'block':'none'}"></div>`).join('')}
      </div>
    </div>
  </div>`;

  if(isBoss){renderOverview();renderRecords();}else{renderSales();renderMy();}
}
function navTo(k){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.id==='nav-'+k));
  document.querySelectorAll('[id^="pg-"]').forEach(p=>p.style.display=p.id==='pg-'+k?'block':'none');
}

// ---- OP PAGES ----
function mySales(){return allSales.filter(s=>s.operator===cur.key)}
function renderSales(){
  const pg=document.getElementById('pg-sales');if(!pg)return;
  const sales=mySales();const cur2=thisMonth(sales);
  const m=cur2.filter(s=>s.type==='monthly').length;
  const q=cur2.filter(s=>s.type==='quarterly').length;
  const kpi=kpiLvl(m,q);
  const sorted=[...sales].sort((a,b)=>b.date.localeCompare(a.date));

  pg.innerHTML=`
  <div class="card">
    <div class="card-title"><i class="ti ti-circle-plus" aria-hidden="true"></i> Новий продаж</div>
    <div class="frow">
      <div class="field"><label>Тип абонемента</label>
        <select id="s-type"><option value="monthly">Місячний (+100 грн)</option><option value="quarterly">Квартальний (+350 грн)</option></select></div>
      <div class="field"><label>Дата</label><input type="date" id="s-date" value="${today()}"></div>
    </div>
    <div class="frow">
      <div class="field"><label>ПІБ клієнта</label><input type="text" id="s-pib" placeholder="Іваненко Іван Іванович"></div>
      <div class="field"><label>Номер телефону</label><input type="text" id="s-phone" placeholder="+380 XX XXX XX XX"></div>
    </div>
    <div class="frow">
      <div class="field"><label>Номер авто</label><input type="text" id="s-car" placeholder="AA 1234 BB"></div>
      <div style="display:flex;align-items:flex-end;padding-bottom:.75rem">
        <button class="primary" onclick="addSale()" style="width:100%"><i class="ti ti-plus" aria-hidden="true"></i> Зафіксувати</button></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <span class="card-title" style="margin:0"><i class="ti ti-chart-bar" aria-hidden="true"></i> Поточний місяць</span>
      <span class="badge ${kpiClass(kpi.label)}">${kpi.label||'KPI не досягнуто'}</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="ml">Місячних</div><div class="mv">${m}</div><div class="ms">× 100 грн</div></div>
      <div class="metric"><div class="ml">Квартальних</div><div class="mv">${q}</div><div class="ms">× 350 грн</div></div>
      <div class="metric"><div class="ml">Премія</div><div class="mv">${fmt(m*100+q*350+kpi.bonus)}</div><div class="ms">з KPI-бонусом</div></div>
    </div>
    <div style="font-size:12px;color:var(--text2);display:flex;justify-content:space-between"><span>Прогрес KPI</span><span>${kpi.pct}%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,kpi.pct/2)}%"></div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-list" aria-hidden="true"></i> Мої записи (${sales.length})</div>
    ${sorted.length?`<div class="tbl-wrap"><table>
      <thead><tr><th>Дата</th><th>Тип</th><th>ПІБ</th><th>Телефон</th><th>Авто</th><th></th></tr></thead>
      <tbody>${sorted.map(s=>`<tr>
        <td style="white-space:nowrap;color:var(--text2)">${fmtDate(s.date)}</td>
        <td><span class="badge b-${s.type==='quarterly'?'q':'m'}">${s.type==='monthly'?'Місячний':'Квартальний'}</span></td>
        <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.pib||'—'}</td>
        <td>${s.phone||'—'}</td><td>${s.car||'—'}</td>
        <td><button class="action-btn danger" onclick="delSale('${s.fbKey}')" aria-label="Видалити"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
      </tr>`).join('')}</tbody></table></div>`
    :`<div class="empty"><i class="ti ti-clipboard-list" aria-hidden="true"></i>Записів ще немає</div>`}
  </div>`;
}

function renderMy(){
  const pg=document.getElementById('pg-my');if(!pg)return;
  const sales=mySales();const now=new Date();
  const months=[];
  for(let i=0;i<4;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=d.toLocaleString('uk-UA',{month:'long',year:'numeric'});
    const ms=sales.filter(s=>s.date&&s.date.startsWith(ym));
    const m=ms.filter(s=>s.type==='monthly').length;
    const q=ms.filter(s=>s.type==='quarterly').length;
    const kpi=kpiLvl(m,q);
    months.push({label,m,q,kpi,bonus:m*100+q*350+kpi.bonus});
  }
  pg.innerHTML=`<div class="card">
    <div class="card-title"><i class="ti ti-calendar-stats" aria-hidden="true"></i> Статистика по місяцях</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Місяць</th><th>Міс.</th><th>Кварт.</th><th>KPI</th><th>Премія</th></tr></thead>
      <tbody>${months.map(({label,m,q,kpi,bonus})=>`<tr>
        <td style="font-weight:600">${label}</td>
        <td>${m}</td><td>${q}</td>
        <td><span class="badge ${kpiClass(kpi.label)}">${kpi.label||'—'}</span></td>
        <td style="font-weight:600">${fmt(bonus)}</td>
      </tr>`).join('')}</tbody></table></div>
  </div>`;
}

// ---- BOSS PAGES ----
function renderOverview(){
  const pg=document.getElementById('pg-overview');if(!pg)return;
  const rows=OPS.filter(o=>!o.boss).map(op=>{
    const s=allSales.filter(x=>x.operator===op.key);
    const cur2=thisMonth(s);
    const m=cur2.filter(x=>x.type==='monthly').length;
    const q=cur2.filter(x=>x.type==='quarterly').length;
    const kpi=kpiLvl(m,q);
    return{op,m,q,kpi,bonus:m*100+q*350+kpi.bonus,cur:cur2};
  });
  const tot=rows.reduce((a,r)=>({m:a.m+r.m,q:a.q+r.q,b:a.b+r.bonus}),{m:0,q:0,b:0});
  const share=tot.m+tot.q>0?Math.round(tot.q/(tot.m+tot.q)*100):0;

  pg.innerHTML=`
  <div class="metrics">
    <div class="metric"><div class="ml">Фонд премій</div><div class="mv">${fmt(tot.b)}</div><div class="ms">поточний місяць</div></div>
    <div class="metric"><div class="ml">Всього продажів</div><div class="mv">${tot.m+tot.q}</div><div class="ms">${tot.m} міс. + ${tot.q} кварт.</div></div>
    <div class="metric"><div class="ml">Квартальних</div><div class="mv">${share}%</div><div class="ms">частка</div></div>
    <div class="metric"><div class="ml">Всього записів</div><div class="mv">${allSales.length}</div><div class="ms">за весь час</div></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-users" aria-hidden="true"></i> Оператори — поточний місяць</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Оператор</th><th>Міс.</th><th>Кварт.</th><th>KPI</th><th>Премія</th></tr></thead>
      <tbody>
      ${rows.map(({op,m,q,kpi,bonus})=>`<tr>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div class="av" style="width:28px;height:28px;background:${op.bg};color:${op.tc}">${op.init}</div>
          <span style="font-weight:600">${op.name}</span></div></td>
        <td>${m}</td><td>${q}</td>
        <td><span class="badge ${kpiClass(kpi.label)}">${kpi.label||'—'}</span></td>
        <td style="font-weight:600">${fmt(bonus)}</td>
      </tr>`).join('')}
      <tr style="background:var(--bg2)">
        <td style="font-weight:700">Разом</td><td style="font-weight:700">${tot.m}</td>
        <td style="font-weight:700">${tot.q}</td><td></td>
        <td style="font-weight:700">${fmt(tot.b)}</td>
      </tr></tbody></table></div>
  </div>
  <div class="op-grid">
  ${rows.map(({op,m,q,kpi,bonus,cur:cur2})=>{
    const last3=[...cur2].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
    return`<div class="op-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem">
        <div class="av" style="width:36px;height:36px;background:${op.bg};color:${op.tc};font-size:12px">${op.init}</div>
        <div><div style="font-weight:600;font-size:14px">${op.name}</div>
          <span class="badge ${kpiClass(kpi.label)}" style="margin-top:3px;display:inline-flex">${kpi.label||'—'}</span></div>
      </div>
      <div style="font-size:22px;font-weight:700">${fmt(bonus)}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${m} міс. · ${q} кварт.</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,kpi.pct/2)}%"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:3px;margin-bottom:.625rem">${kpi.pct}% KPI</div>
      ${last3.map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-top:1px solid var(--border)">
        <span style="color:var(--text2)">${fmtDate(s.date)}</span>
        <span>${s.type==='monthly'?'Міс.':'Кварт.'}${s.pib?' · '+s.pib.split(' ')[0]:''}${s.car?' · '+s.car:''}</span>
      </div>`).join('')}
    </div>`;
  }).join('')}
  </div>`;
}

function renderRecords(){
  const pg=document.getElementById('pg-records');if(!pg)return;
  const sorted=[...allSales].sort((a,b)=>b.date.localeCompare(a.date));
  pg.innerHTML=`<div class="card">
    <div class="card-title"><i class="ti ti-database" aria-hidden="true"></i> Всі записи (${sorted.length})</div>
    ${!sorted.length?`<div class="empty"><i class="ti ti-database" aria-hidden="true"></i>Записів немає</div>`:`
    <div class="tbl-wrap"><table>
      <thead><tr><th>Оператор</th><th>Дата</th><th>Тип</th><th>ПІБ</th><th>Телефон</th><th>Авто</th><th></th></tr></thead>
      <tbody>${sorted.map(s=>{
        const op=OPS.find(o=>o.key===s.operator)||{init:'?',bg:'#eee',tc:'#333',name:'?'};
        return`<tr>
          <td><div style="display:flex;align-items:center;gap:6px">
            <div class="av" style="width:22px;height:22px;font-size:10px;background:${op.bg};color:${op.tc}">${op.init}</div>
            <span style="font-weight:600;font-size:12px">${op.name}</span></div></td>
          <td style="white-space:nowrap;color:var(--text2)">${fmtDate(s.date)}</td>
          <td><span class="badge b-${s.type==='quarterly'?'q':'m'}">${s.type==='monthly'?'Міс.':'Кварт.'}</span></td>
          <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.pib||'—'}</td>
          <td>${s.phone||'—'}</td><td>${s.car||'—'}</td>
          <td style="white-space:nowrap">
            <button class="action-btn" onclick="openEdit('${s.fbKey}')" aria-label="Редагувати"><i class="ti ti-edit" aria-hidden="true"></i></button>
            <button class="action-btn danger" onclick="delSale('${s.fbKey}')" aria-label="Видалити"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </td>
        </tr>`;
      }).join('')}</tbody></table></div>`}
  </div>`;
}

// ---- ACTIONS ----
async function addSale(){
  const sale={
    operator:cur.key,
    type:document.getElementById('s-type').value,
    date:document.getElementById('s-date').value||today(),
    pib:document.getElementById('s-pib').value.trim(),
    phone:document.getElementById('s-phone').value.trim(),
    car:document.getElementById('s-car').value.trim().toUpperCase(),
    createdAt:Date.now(),
  };
  await salesRef.push(sale);
  ['s-pib','s-phone','s-car'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  toast('Продаж збережено ✓');
}
async function delSale(fbKey){
  if(!confirm('Видалити цей запис?'))return;
  await salesRef.child(fbKey).remove();
  toast('Видалено');
}
function openEdit(fbKey){
  const s=allSales.find(x=>x.fbKey===fbKey);if(!s)return;
  modal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head"><h3><i class="ti ti-edit" aria-hidden="true"></i> Редагування запису</h3>
        <button class="action-btn" onclick="closeModal()" aria-label="Закрити"><i class="ti ti-x" aria-hidden="true"></i></button></div>
      <div class="frow">
        <div class="field"><label>Тип</label>
          <select id="e-type"><option value="monthly" ${s.type==='monthly'?'selected':''}>Місячний</option><option value="quarterly" ${s.type==='quarterly'?'selected':''}>Квартальний</option></select></div>
        <div class="field"><label>Дата</label><input type="date" id="e-date" value="${s.date}"></div>
      </div>
      <div class="frow">
        <div class="field"><label>ПІБ</label><input type="text" id="e-pib" value="${s.pib||''}"></div>
        <div class="field"><label>Телефон</label><input type="text" id="e-phone" value="${s.phone||''}"></div>
      </div>
      <div class="field"><label>Номер авто</label><input type="text" id="e-car" value="${s.car||''}"></div>
      <div style="display:flex;gap:8px;margin-top:1rem">
        <button class="primary" onclick="saveEdit('${fbKey}')" style="flex:1"><i class="ti ti-check" aria-hidden="true"></i> Зберегти</button>
        <button onclick="closeModal()" style="flex:1"><i class="ti ti-x" aria-hidden="true"></i> Скасувати</button>
      </div>
    </div>
  </div>`);
}
async function saveEdit(fbKey){
  await salesRef.child(fbKey).update({
    type:document.getElementById('e-type').value,
    date:document.getElementById('e-date').value,
    pib:document.getElementById('e-pib').value.trim(),
    phone:document.getElementById('e-phone').value.trim(),
    car:document.getElementById('e-car').value.trim().toUpperCase(),
  });
  closeModal();toast('Збережено');
}

render();
</script>
</body>
</html>
